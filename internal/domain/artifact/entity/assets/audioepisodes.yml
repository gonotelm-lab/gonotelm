version: 1.0
episodes:
  deep-research:
    style: "deep-research"
    title: "深度研报"
    description: "围绕主题展开系统性的深度研究，以信息源为依据逐层分析，梳理关键证据，提炼实践启示"
    speakers: ["雅典娜", "阿波罗"]
    speaker_roles:
      雅典娜: "主导分析师，负责构建论证框架和证据链"
      阿波罗: "补充分析师，负责拆解复杂概念和追问细节"
    num_of_segments: 7
    segment_flow:
      - "背景引入：说明研究动机与范围"
      - "核心论点：提炼主要发现"
      - "证据展开：逐项分析支撑数据"
      - "深度解析：关键概念的拆解与延伸"
      - "交叉验证：多源对比与矛盾讨论"
      - "实践启示：从结论到行动建议"
      - "总结与展望"
  abstract:
    style: "abstract"
    title: "速览简报"
    description: "用最精炼的语言提炼核心观点，交代背景脉络，给出关键结论，让听众在最短时间内把握主题全貌"
    speakers: ["赫尔墨斯"]
    speaker_roles:
      赫尔墨斯: "独立讲述者，用故事化表达串联信息，将复杂问题浓缩为清晰主线"
    num_of_segments: 3
    segment_flow:
      - "开场钩子：一个引人入胜的切入点"
      - "核心内容：背景、论点、结论一气呵成"
      - "收束：一句话总结 + 延伸思考引导"
  discussion:
    style: "discussion"
    title: "多面圆桌"
    description: "围绕主题展开多视角讨论，呈现不同立场和思考维度，在观点的碰撞与比较中拆解议题的复杂性"
    speakers: ["伊里斯", "阿波罗", "狄俄尼索斯"]
    speaker_roles:
      伊里斯: "圆桌主持人，控节奏、抛话题、连接不同观点"
      阿波罗: "方法论视角，从学术和系统性角度分析问题"
      狄俄尼索斯: "民间智慧视角，从生活经验和直觉出发挑战常规思维"
    num_of_segments: 6
    segment_flow:
      - "破冰预热：主持人抛出主题，各位表态"
      - "立场展开：阿波罗与狄俄尼索斯分别阐述各自切入角度"
      - "正面论据：阿波罗建立系统性论证"
      - "挑战与反思：狄俄尼索斯从生活智慧角度提出质疑"
      - "交叉讨论：伊里斯引导双方寻找共识与分歧"
      - "收束总结：提炼多元视角的核心收获"
  debate:
    style: "debate"
    title: "针锋相对"
    description: "正反双方围绕核心议题展开结构化辩论，通过立论、攻防、反驳与总结，在对抗中逼近真相"
    speakers: ["厄里斯", "雅典娜", "伊里斯"]
    speaker_roles:
      厄里斯: "正方辩手，负责搭建正面论点和主动攻击对方逻辑漏洞"
      雅典娜: "反方辩手，负责构建反方立场，用数据和证据回击"
      伊里斯: "辩论主席，宣布规则、划分环节、维持秩序并做平衡收束"
    num_of_segments: 6
    segment_flow:
      - "规则宣布与议题简介"
      - "正方立论：厄里斯阐述核心论点与论据"
      - "反方立论：雅典娜阐述对立观点与论据"
      - "自由攻防：厄里斯质询、雅典娜应答，交替进行"
      - "结辩陈述：双方各做最后总结"
      - "主席收束：伊里斯总结双方交锋要点，不做胜负判定"
