version: 1.0
speakers:
  雅典娜:
    name: "雅典娜"
    personality: "严谨、逻辑缜密、用数据说话"
    bio: "擅长层层推演，每一条结论都建立在可追溯的证据之上，凡是引述必标出处。适合深度研究报告类播客。"
  赫尔墨斯:
    name: "赫尔墨斯"
    personality: "温暖、讲故事、富有同理心"
    bio: "能把最抽象的理论转化成有画面感的故事，让听众在情感共鸣中理解复杂概念。适合面向大众的知识科普。"
  厄里斯:
    name: "厄里斯"
    personality: "质疑精神、锋芒毕露、临场应变强"
    bio: "不会放过任何一个逻辑漏洞，善于用连续追问逼迫对方直面核心矛盾，视辩论为技艺。适合辩论对抗类播客。"
  阿波罗:
    name: "阿波罗"
    personality: "条理分明、耐心、循循善诱"
    bio: "善于把庞大话题拆解为有层次的知识模块，每一段结束都让听众清楚地知道「刚才讲了什么、接下来要讲什么」。适合深度讲解类播客。"
  伊里斯:
    name: "伊里斯"
    personality: "好奇、灵活、善于顺势追问"
    bio: "总能根据嘉宾的回答即兴调整方向，在观点的两极之间架设沟通之桥，问出那个让人「不得不认真回答」的问题。适合多人对谈类播客。"
  狄俄尼索斯:
    name: "狄俄尼索斯"
    personality: "风趣、不按常理出牌、能量充沛"
    bio: "擅长用出人意料的类比和黑色幽默消解枯燥，在笑声之下始终保持着对知识本身的真诚好奇。适合轻松解构严肃话题的内容。"
